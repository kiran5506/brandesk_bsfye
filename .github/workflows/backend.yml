name: Deploy node application
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.set_tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Set image tag
        id: set_tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_TAG="v1.0.${{ github.run_number }}-${SHORT_SHA}"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "Image tag: ${IMAGE_TAG}"
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            bsfye/bsfye-backend:latest
            bsfye/bsfye-backend:${{ steps.set_tag.outputs.image_tag }}
  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Pull Image from Docker Hub
        run: docker pull bsfye/bsfye-backend:${{ needs.build.outputs.image_tag }}
      - name: Stop and remove existing container
        run: |
          docker stop bsfye-app-container || true
          docker rm bsfye-app-container || true
      - name: Run Docker Container
        run: |
          docker run -d --restart=always -p 4000:4000 --name bsfye-app-container \
            -e PORT=4000 \
            -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            -e MONGO_URL="${{ secrets.MONGO_URL }}" \
            -e BASE_URL="${{ secrets.BASE_URL }}" \
            -e RAZORPAY_KEY_ID="${{ secrets.RAZORPAY_KEY_ID }}" \
            -e RAZORPAY_KEY_SECRET="${{ secrets.RAZORPAY_KEY_SECRET }}" \
            -e AWS_REGION="${{ secrets.AWS_REGION }}" \
            -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            -e AWS_S3_BUCKET="${{ secrets.AWS_S3_BUCKET }}" \
            -e SUPPORT_EMAIL="${{ secrets.SUPPORT_EMAIL }}" \
            bsfye/bsfye-backend:${{ needs.build.outputs.image_tag }}
      - name: Clean up old untagged images
        run: docker image prune -f
