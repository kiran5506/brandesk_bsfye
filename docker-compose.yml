version: '3.8'
services:
  backend:
    container_name: bsfye-app-container
    build: .
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      # Read secrets from the host environment or from a local .env file
      - AWS_REGION
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_S3_BUCKET
      - BASE_URL
    # Add other env vars as needed
    # volumes, depends_on, etc. as needed

  frontend:
    container_name: bsfye-frontend-container
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL
      - NEXT_PUBLIC_RAZORPAY_KEY_ID
